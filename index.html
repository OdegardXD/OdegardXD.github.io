<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to Ødegård's personal website.">
    <title>Ødegård's Website</title>
    <link rel="stylesheet" href="./.assets/css/style.css">
</head>
<body>
  <div class="background-container">
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="circle3"></div>
  </div>
  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">
        <a href="./">Ødegård</a>
      </div>
      <div class="navbar-links">
        <a href="./" class="active">Home</a>
        <a href="./about/">About Me</a>
        <a href="./socials/">Socials</a>
      </div>
    </div>
  </div>
  
  <div class="main-middle">
      <div class="circular_image">
        <img src="./.assets/media/doggallery/VeryHappyRaja.jpg" alt="Raja the dog">
      </div>
      <h1>Welcome to my Website!</h1>
      <h3>Hi! I'm Ødegård. This is my small project website that I occasionally work on :)</h3> 
  </div>

  <button id="scrollToTopBtn" title="Go to top">&#8679;</button>
  <script>
    const scrollBtn = document.getElementById('scrollToTopBtn');
    window.onscroll = function() {
      if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
        scrollBtn.style.display = "block";
        scrollBtn.classList.add("show");
      } else {
        scrollBtn.style.display = "none";
        scrollBtn.classList.remove("show");
      }
    };
    scrollBtn.onclick = function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  </script>
</body>
</html>
